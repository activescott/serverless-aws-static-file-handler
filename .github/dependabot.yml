version: 2
# NOTE: The `ignore` and `allow` rules below apply ONLY to Dependabot *version* updates.
# Dependabot *security* updates ignore both, and will bump "ancestor" dependencies
# (e.g. serverless v3 -> v4) as needed to fix a vulnerable transitive dependency.
# The guard-serverless-v3 workflow (a required status check on main) is what actually
# prevents a serverless v4 upgrade from merging.
updates:
  # docs v2 https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      # Check for npm updates on Sundays
      day: "saturday"
    allow:
      - dependency-type: "production"
    ignore:
      - dependency-name: "serverless"
        versions: [">=4"]
    commit-message:
      # for production deps, prefix commit messages with "fix" (trigger a patch release)
      prefix: "fix"
      # for development deps, prefix commit messages with "chore" (do NOT trigger an npm release)
      prefix-development: "chore"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/test-files/basic-project"
    schedule:
      interval: "monthly"
      # Check for npm updates on Sundays
      day: "saturday"
    commit-message:
      # since these are tests/samples, we'll not require a release of the package
      prefix: "chore"
    allow:
      # Allow only direct updates for all packages
      - dependency-type: "direct"
    ignore:
      - dependency-name: "serverless"
        versions: [">=4"]

  - package-ecosystem: "npm"
    directory: "/test-files/webpack-project"
    schedule:
      interval: "monthly"
      # Check for npm updates on Sundays
      day: "saturday"
    commit-message:
      # since these are tests/samples, we'll not require a release of the package
      prefix: "chore"
    allow:
      # Allow only direct updates for all packages
      - dependency-type: "direct"
    ignore:
      - dependency-name: "serverless"
        versions: [">=4"]

  - package-ecosystem: "npm"
    directory: "/examples/basic"
    schedule:
      interval: "monthly"
      # Check for npm updates on Sundays
      day: "saturday"
    commit-message:
      # since these are tests/samples, we'll not require a release of the package
      prefix: "chore"
    allow:
      # Allow only direct updates for all packages
      - dependency-type: "direct"
    ignore:
      - dependency-name: "serverless"
        versions: [">=4"]

  - package-ecosystem: "npm"
    directory: "/examples/serverless-offline"
    schedule:
      interval: "monthly"
      # Check for npm updates on Sundays
      day: "saturday"
    commit-message:
      # since these are tests/samples, we'll not require a release of the package
      prefix: "chore"
    allow:
      # Allow only direct updates for all packages
      - dependency-type: "direct"
    ignore:
      - dependency-name: "serverless"
        versions: [">=4"]
      # serverless-offline v14+ requires Serverless Framework v4
      - dependency-name: "serverless-offline"
        versions: [">=14"]
